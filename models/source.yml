version: 2

sources:
  - name: internal_data
    # This usually points to your main Databricks storage
    database: raw
    schema: website_source
    tables:
      - name: website_session
      - name: order
      - name: order_items
      - name: refunds
      - name: website_pageviews
      - name: products

  - name: external_marketing
    # This points to the new catalog/schema we built for the ad data
    database: raw            
    schema: marketing_spend  
    tables:
      - name: ad_spend